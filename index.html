<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIN flight prices - SIA & Scoot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light}
*{box-sizing:border-box}
body{font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#0f172a;background:transparent;margin:0;padding:16px}
h1{font-size:18px;margin:0 0 4px}
.sub{color:#64748b;font-size:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:16px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dest{padding:12px;border-radius:8px;border:1px solid #e2e8f0}
.dest .name{font-weight:600;font-size:13px;color:#475569}
.dest .price{font-size:26px;font-weight:700;margin:4px 0}
.dest .alt{font-size:13px;color:#475569;margin-top:8px;border-top:1px dashed #e2e8f0;padding-top:6px}
.dest .stats{margin:6px 0 4px;font-size:11.5px;color:#475569;line-height:1.55}
.dest .stats strong{color:#0f172a}
.meta{font-size:11px;color:#64748b}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.tabs{display:inline-flex;gap:4px;background:#f1f5f9;padding:3px;border-radius:8px;margin-bottom:12px}
.tab{padding:6px 12px;border:0;background:transparent;border-radius:6px;font-size:12px;cursor:pointer;color:#475569}
.tab.active{background:#fff;color:#0f172a;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.chartwrap{position:relative;height:320px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:7px 6px;border-bottom:1px solid #f1f5f9}
th{color:#64748b;font-weight:600}
.empty{color:#64748b;padding:24px;text-align:center}
.tag{display:inline-block;background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:999px;font-size:11px;margin-left:6px}
</style>
</head>
<body>
<h1>SIN flight prices &mdash; SIA &amp; Scoot</h1>
<div class="sub">Daily snapshot of Trip.com&rsquo;s lowest published fares to Bangkok, Phuket, Taipei. Round-trip filter: June 2026 dep, 3-5 night stay.</div>

<div class="card">
  <div class="summary" id="summary"></div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" data-metric="one_way_june">One-way June</button>
    <button class="tab" data-metric="round_trip_june">Round-trip (3-5n)</button>
  </div>
  <div class="chartwrap"><canvas id="trend"></canvas></div>
</div>

<div class="card">
  <h3 style="margin:0 0 8px;font-size:14px">All snapshots</h3>
  <div id="history"></div>
</div>

<script>
const PAYLOAD = {"labels": ["2026-06-02"], "metrics": {"one_way_june": [{"label": "Bangkok", "dest": "BKK", "data": [null], "borderColor": "#2563eb", "backgroundColor": "#2563eb33", "tension": 0.25, "spanGaps": true, "pointRadius": 4}, {"label": "Phuket", "dest": "HKT", "data": [104], "borderColor": "#16a34a", "backgroundColor": "#16a34a33", "tension": 0.25, "spanGaps": true, "pointRadius": 4}, {"label": "Taipei", "dest": "TPE", "data": [175], "borderColor": "#dc2626", "backgroundColor": "#dc262633", "tension": 0.25, "spanGaps": true, "pointRadius": 4}], "round_trip_june": [{"label": "Bangkok", "dest": "BKK", "data": [157], "borderColor": "#2563eb", "backgroundColor": "#2563eb33", "tension": 0.25, "spanGaps": true, "pointRadius": 4}, {"label": "Phuket", "dest": "HKT", "data": [194], "borderColor": "#16a34a", "backgroundColor": "#16a34a33", "tension": 0.25, "spanGaps": true, "pointRadius": 4}, {"label": "Taipei", "dest": "TPE", "data": [253], "borderColor": "#dc2626", "backgroundColor": "#dc262633", "tension": 0.25, "spanGaps": true, "pointRadius": 4}]}, "latest": {"round_trip_june|BKK": {"snapshot_date": "2026-06-02", "dest": "BKK", "metric": "round_trip_june", "price_sgd": "157", "dep_date": "2026-05-06", "ret_date": "2026-05-08", "airline_out": "Thai Lion Air", "airline_in": "Thai Lion Air", "note": "fallback_headline_any_airline"}, "one_way_june|HKT": {"snapshot_date": "2026-06-02", "dest": "HKT", "metric": "one_way_june", "price_sgd": "104", "dep_date": "2026-06-28", "ret_date": "", "airline_out": "Scoot", "airline_in": "", "note": "sia_scoot"}, "round_trip_june|HKT": {"snapshot_date": "2026-06-02", "dest": "HKT", "metric": "round_trip_june", "price_sgd": "194", "dep_date": "2026-06-28", "ret_date": "2026-07-02", "airline_out": "Scoot", "airline_in": "Scoot", "note": "june_3to5n_sia_scoot"}, "one_way_june|TPE": {"snapshot_date": "2026-06-02", "dest": "TPE", "metric": "one_way_june", "price_sgd": "175", "dep_date": "2026-06-02", "ret_date": "", "airline_out": "Scoot", "airline_in": "", "note": "sia_scoot"}, "round_trip_june|TPE": {"snapshot_date": "2026-06-02", "dest": "TPE", "metric": "round_trip_june", "price_sgd": "253", "dep_date": "2026-05-19", "ret_date": "2026-05-22", "airline_out": "Scoot", "airline_in": "Scoot", "note": "fallback_any_month_sia_scoot"}}, "rows": [{"snapshot_date": "2026-06-02", "dest": "BKK", "metric": "round_trip_june", "price_sgd": "157", "dep_date": "2026-05-06", "ret_date": "2026-05-08", "airline_out": "Thai Lion Air", "airline_in": "Thai Lion Air", "note": "fallback_headline_any_airline"}, {"snapshot_date": "2026-06-02", "dest": "HKT", "metric": "one_way_june", "price_sgd": "104", "dep_date": "2026-06-28", "ret_date": "", "airline_out": "Scoot", "airline_in": "", "note": "sia_scoot"}, {"snapshot_date": "2026-06-02", "dest": "HKT", "metric": "round_trip_june", "price_sgd": "194", "dep_date": "2026-06-28", "ret_date": "2026-07-02", "airline_out": "Scoot", "airline_in": "Scoot", "note": "june_3to5n_sia_scoot"}, {"snapshot_date": "2026-06-02", "dest": "TPE", "metric": "one_way_june", "price_sgd": "175", "dep_date": "2026-06-02", "ret_date": "", "airline_out": "Scoot", "airline_in": "", "note": "sia_scoot"}, {"snapshot_date": "2026-06-02", "dest": "TPE", "metric": "round_trip_june", "price_sgd": "253", "dep_date": "2026-05-19", "ret_date": "2026-05-22", "airline_out": "Scoot", "airline_in": "Scoot", "note": "fallback_any_month_sia_scoot"}], "stats": {"BKK": {"round_trip_june": {"latest_price": 157, "latest_date": "2026-06-02", "latest_meta": {"dep_date": "2026-05-06", "ret_date": "2026-05-08", "airline_out": "Thai Lion Air", "airline_in": "Thai Lion Air", "note": "fallback_headline_any_airline"}, "prior_price": null, "delta_day_pct": null, "avg_7d": 157, "delta_vs_7d_pct": 0.0, "lowest_so_far": 157, "lowest_date": "2026-06-02", "snapshots": 1, "trend_recent": "flat"}}, "HKT": {"one_way_june": {"latest_price": 104, "latest_date": "2026-06-02", "latest_meta": {"dep_date": "2026-06-28", "ret_date": "", "airline_out": "Scoot", "airline_in": "", "note": "sia_scoot"}, "prior_price": null, "delta_day_pct": null, "avg_7d": 104, "delta_vs_7d_pct": 0.0, "lowest_so_far": 104, "lowest_date": "2026-06-02", "snapshots": 1, "trend_recent": "flat"}, "round_trip_june": {"latest_price": 194, "latest_date": "2026-06-02", "latest_meta": {"dep_date": "2026-06-28", "ret_date": "2026-07-02", "airline_out": "Scoot", "airline_in": "Scoot", "note": "june_3to5n_sia_scoot"}, "prior_price": null, "delta_day_pct": null, "avg_7d": 194, "delta_vs_7d_pct": 0.0, "lowest_so_far": 194, "lowest_date": "2026-06-02", "snapshots": 1, "trend_recent": "flat"}}, "TPE": {"one_way_june": {"latest_price": 175, "latest_date": "2026-06-02", "latest_meta": {"dep_date": "2026-06-02", "ret_date": "", "airline_out": "Scoot", "airline_in": "", "note": "sia_scoot"}, "prior_price": null, "delta_day_pct": null, "avg_7d": 175, "delta_vs_7d_pct": 0.0, "lowest_so_far": 175, "lowest_date": "2026-06-02", "snapshots": 1, "trend_recent": "flat"}, "round_trip_june": {"latest_price": 253, "latest_date": "2026-06-02", "latest_meta": {"dep_date": "2026-05-19", "ret_date": "2026-05-22", "airline_out": "Scoot", "airline_in": "Scoot", "note": "fallback_any_month_sia_scoot"}, "prior_price": null, "delta_day_pct": null, "avg_7d": 253, "delta_vs_7d_pct": 0.0, "lowest_so_far": 253, "lowest_date": "2026-06-02", "snapshots": 1, "trend_recent": "flat"}}}};
const DEST_LABEL = {"BKK":"Bangkok","HKT":"Phuket","TPE":"Taipei"};
const COLOR = {"BKK":"#2563eb","HKT":"#16a34a","TPE":"#dc2626"};

let activeMetric = "one_way_june";
let chart;

function fmtPct(p) {
  if (p == null) return 'n/a';
  const sign = p > 0 ? '+' : '';
  return `${sign}${p}%`;
}
function trendBadge(s) {
  if (!s) return '';
  const map = { down: ['#16a34a','↓ down'], up: ['#dc2626','↑ up'], flat: ['#64748b','→ flat'] };
  const [c, label] = map[s.trend_recent] || map.flat;
  return `<span class="tag" style="background:${c}1a;color:${c}">${label}</span>`;
}
function renderSummary() {
  const root = document.getElementById('summary');
  root.innerHTML = '';
  ['BKK','HKT','TPE'].forEach(code => {
    const ow = PAYLOAD.latest['one_way_june|' + code];
    const rt = PAYLOAD.latest['round_trip_june|' + code];
    const ows = (PAYLOAD.stats[code] || {}).one_way_june;
    const rts = (PAYLOAD.stats[code] || {}).round_trip_june;
    const div = document.createElement('div');
    div.className = 'dest';
    div.innerHTML = `
      <div class="name"><span class="dot" style="background:${COLOR[code]}"></span>${DEST_LABEL[code]} (${code})</div>
      ${ow ? `
        <div class="price">S$${ow.price_sgd} ${trendBadge(ows)}</div>
        <div class="meta">one-way June &middot; ${ow.airline_out}${ow.dep_date ? ' &middot; dep ' + ow.dep_date : ''}</div>
        ${ows ? `<div class="stats">
          <div>vs prior day: <strong>${fmtPct(ows.delta_day_pct)}</strong></div>
          <div>vs 7-day avg (S$${ows.avg_7d != null ? Math.round(ows.avg_7d) : 'n/a'}): <strong>${fmtPct(ows.delta_vs_7d_pct)}</strong></div>
          <div>lowest seen: <strong>S$${ows.lowest_so_far}</strong> on ${ows.lowest_date}</div>
        </div>` : ''}
        <div class="meta">snapshot ${ow.snapshot_date}${ow.note && ow.note.startsWith('fallback') ? ' <span class="tag">' + ow.note + '</span>' : ''}</div>
      ` : '<div class="price">--</div><div class="meta">no one-way data</div>'}
      ${rt ? `
        <div class="alt">
          <div><strong>S$${rt.price_sgd}</strong> round-trip ${trendBadge(rts)}</div>
          <div class="meta">${rt.airline_out === rt.airline_in ? rt.airline_out : (rt.airline_out + ' / ' + rt.airline_in)} &middot; ${rt.dep_date} &rarr; ${rt.ret_date}</div>
          ${rts ? `<div class="stats">
            <div>vs prior day: <strong>${fmtPct(rts.delta_day_pct)}</strong></div>
            <div>vs 7-day avg (S$${rts.avg_7d != null ? Math.round(rts.avg_7d) : 'n/a'}): <strong>${fmtPct(rts.delta_vs_7d_pct)}</strong></div>
            <div>lowest seen: <strong>S$${rts.lowest_so_far}</strong> on ${rts.lowest_date}</div>
          </div>` : ''}
          <div class="meta">${rt.note && rt.note.startsWith('fallback') ? '<span class="tag">' + rt.note + '</span>' : ''}</div>
        </div>` : '<div class="alt"><div class="meta">no round-trip match yet</div></div>'}
    `;
    root.appendChild(div);
  });
}

function renderChart() {
  const datasets = PAYLOAD.metrics[activeMetric] || [];
  const ctx = document.getElementById('trend');
  if (PAYLOAD.labels.length === 0 || datasets.every(d => d.data.every(v => v == null))) {
    ctx.parentElement.innerHTML = '<div class="empty">No daily snapshots yet for this metric. The scheduled task populates this each morning.</div>';
    return;
  }
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: PAYLOAD.labels, datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } },
      scales: {
        x: { title: { display: true, text: 'Snapshot date' } },
        y: { title: { display: true, text: 'SGD' }, beginAtZero: false }
      }
    }
  });
}

function renderHistory() {
  const rows = (PAYLOAD.rows || []).slice().sort((a,b) => b.snapshot_date.localeCompare(a.snapshot_date) || a.dest.localeCompare(b.dest) || a.metric.localeCompare(b.metric));
  const root = document.getElementById('history');
  if (rows.length === 0) { root.innerHTML = '<div class="empty">History will appear after the first scrape runs.</div>'; return; }
  const headers = ['Snapshot','Dest','Metric','SGD','Dep','Ret','Out airline','Return airline','Note'];
  let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  for (const r of rows) {
    html += `<tr>
      <td>${r.snapshot_date}</td>
      <td>${DEST_LABEL[r.dest] || r.dest}</td>
      <td>${r.metric.replace('_',' ')}</td>
      <td><strong>S$${r.price_sgd}</strong></td>
      <td>${r.dep_date || ''}</td>
      <td>${r.ret_date || ''}</td>
      <td>${r.airline_out || ''}</td>
      <td>${r.airline_in || ''}</td>
      <td>${r.note || ''}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  root.innerHTML = html;
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeMetric = btn.dataset.metric;
    renderChart();
  });
});

renderSummary();
renderChart();
renderHistory();
</script>
</body>
</html>
